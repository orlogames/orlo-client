name: Deploy — Unity Client Build

on:
  push:
    branches: [main]
    paths:
      - 'Assets/**'
      - 'Packages/**'
      - 'ProjectSettings/**'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows Client
    runs-on: [self-hosted, windows]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Checkout orlo-proto
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/orlo-proto
          path: orlo-proto
          token: ${{ secrets.GH_PAT }}

      - name: Install protoc
        run: choco install protoc --yes

      - name: Generate C# proto sources
        shell: pwsh
        run: |
          $protoDir = "orlo-proto/proto"
          $outDir = "Assets/Scripts/Proto/Generated"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          $protos = Get-ChildItem "$protoDir/orlo" -Filter "*.proto" | ForEach-Object { $_.FullName }
          & protoc --proto_path=$protoDir --csharp_out=$outDir @protos
          Write-Host "Generated C# files:"
          Get-ChildItem $outDir

      - name: Build with Unity
        shell: pwsh
        run: |
          $unity = "C:\Program Files\Unity\Hub\Editor\6000.4.0f1\Editor\Unity.exe"
          & $unity -batchmode -nographics -quit -projectPath . `
            -buildTarget StandaloneWindows64 `
            -executeMethod BuildScript.Build `
            -logFile build-log.txt `
            -buildPath "build/windows/OrloClient.exe"
          if ($LASTEXITCODE -ne 0) { Get-Content build-log.txt -Tail 50; exit 1 }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: orlo-client-windows
          path: build/windows
          retention-days: 30

  build-linux:
    name: Build Linux Client
    runs-on: [self-hosted, windows]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Checkout orlo-proto
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/orlo-proto
          path: orlo-proto
          token: ${{ secrets.GH_PAT }}

      - name: Install protoc
        run: choco install protoc --yes

      - name: Generate C# proto sources
        shell: pwsh
        run: |
          $protoDir = "orlo-proto/proto"
          $outDir = "Assets/Scripts/Proto/Generated"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          $protos = Get-ChildItem "$protoDir/orlo" -Filter "*.proto" | ForEach-Object { $_.FullName }
          & protoc --proto_path=$protoDir --csharp_out=$outDir @protos
          Write-Host "Generated C# files:"
          Get-ChildItem $outDir

      - name: Build with Unity
        shell: pwsh
        run: |
          $unity = "C:\Program Files\Unity\Hub\Editor\6000.4.0f1\Editor\Unity.exe"
          & $unity -batchmode -nographics -quit -projectPath . `
            -buildTarget StandaloneLinux64 `
            -executeMethod BuildScript.Build `
            -logFile build-log.txt `
            -buildPath "build/linux/OrloClient"
          if ($LASTEXITCODE -ne 0) { Get-Content build-log.txt -Tail 50; exit 1 }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: orlo-client-linux
          path: build/linux
          retention-days: 30
