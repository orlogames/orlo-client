name: Release — Client Build & Publish

on:
  push:
    tags:
      - 'v*'          # Triggered by version tags (e.g. v0.2.0)
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 0.2.0) — leave blank for auto from date'
        required: false
        type: string

permissions:
  contents: write

jobs:
  version:
    name: Determine Version
    runs-on: [self-hosted, windows]
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - id: ver
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${{ github.ref_name }}"
            VER="${TAG#v}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            VER="${{ inputs.version }}"
            TAG="v${VER}"
          else
            VER="0.0.$(date +%Y%m%d%H%M)"
            TAG="v${VER}"
          fi
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VER}, Tag: ${TAG}"

  build-windows:
    name: Build Windows
    needs: version
    runs-on: [self-hosted, windows]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Checkout orlo-proto
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/orlo-proto
          path: orlo-proto
          token: ${{ secrets.GH_PAT }}

      - name: Write version file
        run: echo "${{ needs.version.outputs.version }}" > Assets/Resources/version.txt

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Windows-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: Library-Windows-

      - name: Build with Unity
        shell: pwsh
        run: |
          $unity = "C:\Program Files\Unity\Hub\Editor\6000.4.0f1\Editor\Unity.exe"
          & $unity -batchmode -nographics -quit -projectPath . `
            -buildTarget StandaloneWindows64 `
            -executeMethod BuildScript.Build `
            -logFile build-log.txt `
            -buildPath "build/windows/OrloClient.exe"
          if ($LASTEXITCODE -ne 0) { Get-Content build-log.txt -Tail 50; exit 1 }

      - name: Create zip
        run: |
          cd build/windows
          zip -r ../../OrloClient-Windows-${{ needs.version.outputs.version }}.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: orlo-client-windows
          path: OrloClient-Windows-${{ needs.version.outputs.version }}.zip
          retention-days: 30

  build-linux:
    name: Build Linux
    needs: version
    runs-on: [self-hosted, windows]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Checkout orlo-proto
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/orlo-proto
          path: orlo-proto
          token: ${{ secrets.GH_PAT }}

      - name: Write version file
        run: echo "${{ needs.version.outputs.version }}" > Assets/Resources/version.txt

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Linux-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: Library-Linux-

      - name: Build with Unity
        shell: pwsh
        run: |
          $unity = "C:\Program Files\Unity\Hub\Editor\6000.4.0f1\Editor\Unity.exe"
          & $unity -batchmode -nographics -quit -projectPath . `
            -buildTarget StandaloneLinux64 `
            -executeMethod BuildScript.Build `
            -logFile build-log.txt `
            -buildPath "build/linux/OrloClient"
          if ($LASTEXITCODE -ne 0) { Get-Content build-log.txt -Tail 50; exit 1 }

      - name: Create tarball
        run: |
          cd build/linux
          tar czf ../../OrloClient-Linux-${{ needs.version.outputs.version }}.tar.gz .

      - uses: actions/upload-artifact@v4
        with:
          name: orlo-client-linux
          path: OrloClient-Linux-${{ needs.version.outputs.version }}.tar.gz
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: [version, build-windows, build-linux]
    runs-on: [self-hosted, windows]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: orlo-client-windows
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: orlo-client-linux
          path: dist/

      - name: Generate changelog
        id: changelog
        run: |
          {
            echo "changelog<<CHANGELOG_EOF"
            echo "## What's Changed"
            echo ""
            git log --pretty=format:'- %s (%h)' $(git describe --tags --abbrev=0 2>/dev/null || echo HEAD~10)..HEAD | head -30
            echo ""
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create tag if not exists
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: Orlo Client ${{ needs.version.outputs.tag }}
          body: |
            ${{ steps.changelog.outputs.changelog }}

            ## Downloads
            - **Windows**: `OrloClient-Windows-${{ needs.version.outputs.version }}.zip`
            - **Linux**: `OrloClient-Linux-${{ needs.version.outputs.version }}.tar.gz`

            ## Auto-update
            Run `update-client.ps1` in your dev environment to auto-download the latest release.
          files: |
            dist/OrloClient-Windows-${{ needs.version.outputs.version }}.zip
            dist/OrloClient-Linux-${{ needs.version.outputs.version }}.tar.gz
          draft: false
          prerelease: false
