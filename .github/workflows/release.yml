name: Release — Client Build & Publish

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  repository_dispatch:
    types: [proto-updated]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 0.2.0) — leave blank for auto from run_number'
        required: false
        type: string

permissions:
  contents: write

env:
  S3_ENDPOINT: https://fsn1.your-objectstorage.com
  S3_BUCKET: orlo-cdn
  S3_REGION: fsn1

jobs:
  version:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - id: ver
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
            VER="${TAG#v}"
          elif [ -n "${{ inputs.version }}" ]; then
            VER="${{ inputs.version }}"
            TAG="v$VER"
          else
            VER="0.0.${{ github.run_number }}"
            TAG="v$VER"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Version: $VER, Tag: $TAG"

  build-windows:
    name: Build Windows
    needs: version
    runs-on: [self-hosted, client]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Checkout orlo-proto
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/orlo-proto
          path: orlo-proto
          token: ${{ secrets.GH_PAT }}

      - name: Install protoc
        shell: powershell
        run: |
          $version = "29.3"
          $url = "https://github.com/protocolbuffers/protobuf/releases/download/v$version/protoc-$version-win64.zip"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\protoc.zip"
          Expand-Archive -Path "$env:TEMP\protoc.zip" -DestinationPath "$env:TEMP\protoc" -Force
          echo "$env:TEMP\protoc\bin" >> $env:GITHUB_PATH

      - name: Generate C# proto sources
        shell: powershell
        run: |
          $protoDir = "orlo-proto/proto"
          $outDir = "Assets/Scripts/Proto"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          $protos = Get-ChildItem "$protoDir/orlo" -Filter "*.proto" | ForEach-Object { "orlo/$($_.Name)" }
          & protoc --proto_path=$protoDir --csharp_out=$outDir @protos
          Write-Host "Generated C# files:"
          Get-ChildItem $outDir

      - name: Write version file
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path Assets/Resources | Out-Null
          "${{ needs.version.outputs.version }}" | Out-File -FilePath Assets/Resources/version.txt -Encoding utf8

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Windows-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: Library-Windows-

      - name: Find Unity installation
        id: unity
        shell: powershell
        run: |
          $searchPaths = @(
            "C:\Program Files\Unity\Hub\Editor\6000.*\Editor\Unity.exe",
            "F:\Unity\6000.*\Editor\Unity.exe",
            "D:\Unity\6000.*\Editor\Unity.exe"
          )
          $unity = $null
          foreach ($p in $searchPaths) {
            $found = Get-Item $p -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) { $unity = $found.FullName; break }
          }
          if (-not $unity) { throw "Unity not found in any search path" }
          Write-Host "Found Unity at: $unity"
          echo "path=$unity" >> $env:GITHUB_OUTPUT

      - name: Download assets-pak from Dropbox
        id: pak
        shell: powershell
        env:
          DROPBOX_ACCESS_TOKEN: ${{ secrets.DROPBOX_ACCESS_TOKEN }}
        run: |
          New-Item -ItemType Directory -Force -Path Assets/StreamingAssets | Out-Null
          Write-Host "Fetching latest assets.pak from Dropbox..."
          $pakFound = $false

          try {
            $headers = @{
              "Authorization" = "Bearer $env:DROPBOX_ACCESS_TOKEN"
              "Dropbox-API-Arg" = '{"path": "/ci/orlo-assets/assets-pak.tar.gz"}'
            }
            Invoke-WebRequest -Uri "https://content.dropboxapi.com/2/files/download" `
              -Method POST -Headers $headers -OutFile "assets-pak.tar.gz"
            if (Test-Path "assets-pak.tar.gz") {
              New-Item -ItemType Directory -Force -Path pak-download | Out-Null
              tar xzf assets-pak.tar.gz -C pak-download
              if (Test-Path "pak-download/assets.pak") {
                Copy-Item "pak-download/assets.pak" "Assets/StreamingAssets/assets.pak"
                $pakFound = $true
              }
            }
          } catch {
            Write-Host "Dropbox download failed: $($_.Exception.Message)"
          }

          if ($pakFound) {
            $size = (Get-Item "Assets/StreamingAssets/assets.pak").Length
            $sizeMB = [math]::Round($size / 1MB, 1)
            Write-Host "SUCCESS: assets.pak downloaded ($sizeMB MB)"
            echo "has_pak=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "ERROR: Could not download assets.pak - build will have NO 3D models!"
            echo "has_pak=false" >> $env:GITHUB_OUTPUT
          }

      - name: Build with Unity
        shell: powershell
        run: |
          $unity = "${{ steps.unity.outputs.path }}"
          $proc = Start-Process -FilePath $unity -ArgumentList @(
            '-batchmode', '-nographics', '-quit', '-projectPath', '.',
            '-buildTarget', 'StandaloneWindows64',
            '-executeMethod', 'BuildScript.Build',
            '-logFile', 'build-log.txt',
            '-buildPath', 'build/windows/OrloClient.exe'
          ) -Wait -PassThru -NoNewWindow
          if ($proc.ExitCode -ne 0) {
            if (Test-Path build-log.txt) { Get-Content build-log.txt -Tail 50 }
            exit 1
          }

      - name: Generate file manifest
        shell: powershell
        run: |
          python scripts/generate_manifest.py `
            --build-dir build/windows `
            --version "${{ needs.version.outputs.version }}" `
            --output build/manifest.json

      - name: Create zip (fallback)
        shell: powershell
        run: |
          Compress-Archive -Path build/windows/* -DestinationPath "OrloClient-Windows-${{ needs.version.outputs.version }}.zip"

      - name: Upload orlo-client-windows to Dropbox
        shell: powershell
        env:
          DROPBOX_ACCESS_TOKEN: ${{ secrets.DROPBOX_ACCESS_TOKEN }}
        run: |
          $zipFile = "OrloClient-Windows-${{ needs.version.outputs.version }}.zip"
          $dropboxPath = "/ci/orlo-client/orlo-client-windows-${{ github.sha }}.tar.gz"
          tar czf orlo-client-windows.tar.gz $zipFile
          $headers = @{
            "Authorization" = "Bearer $env:DROPBOX_ACCESS_TOKEN"
            "Dropbox-API-Arg" = "{`"path`": `"$dropboxPath`", `"mode`": `"overwrite`"}"
            "Content-Type" = "application/octet-stream"
          }
          Invoke-WebRequest -Uri "https://content.dropboxapi.com/2/files/upload" `
            -Method POST -Headers $headers -InFile "orlo-client-windows.tar.gz"

      - name: Upload orlo-client-files to Dropbox
        shell: powershell
        env:
          DROPBOX_ACCESS_TOKEN: ${{ secrets.DROPBOX_ACCESS_TOKEN }}
        run: |
          $dropboxPath = "/ci/orlo-client/orlo-client-files-${{ github.sha }}.tar.gz"
          tar czf orlo-client-files.tar.gz -C build/windows .
          $headers = @{
            "Authorization" = "Bearer $env:DROPBOX_ACCESS_TOKEN"
            "Dropbox-API-Arg" = "{`"path`": `"$dropboxPath`", `"mode`": `"overwrite`"}"
            "Content-Type" = "application/octet-stream"
          }
          Invoke-WebRequest -Uri "https://content.dropboxapi.com/2/files/upload" `
            -Method POST -Headers $headers -InFile "orlo-client-files.tar.gz"

      - name: Upload orlo-client-manifest to Dropbox
        shell: powershell
        env:
          DROPBOX_ACCESS_TOKEN: ${{ secrets.DROPBOX_ACCESS_TOKEN }}
        run: |
          $dropboxPath = "/ci/orlo-client/orlo-client-manifest-${{ github.sha }}.tar.gz"
          tar czf orlo-client-manifest.tar.gz -C build manifest.json
          $headers = @{
            "Authorization" = "Bearer $env:DROPBOX_ACCESS_TOKEN"
            "Dropbox-API-Arg" = "{`"path`": `"$dropboxPath`", `"mode`": `"overwrite`"}"
            "Content-Type" = "application/octet-stream"
          }
          Invoke-WebRequest -Uri "https://content.dropboxapi.com/2/files/upload" `
            -Method POST -Headers $headers -InFile "orlo-client-manifest.tar.gz"

  release:
    name: Create GitHub Release
    needs: [version, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download orlo-client-windows from Dropbox
        env:
          DROPBOX_ACCESS_TOKEN: ${{ secrets.DROPBOX_ACCESS_TOKEN }}
        run: |
          curl -X POST https://content.dropboxapi.com/2/files/download \
            --header "Authorization: Bearer $DROPBOX_ACCESS_TOKEN" \
            --header "Dropbox-API-Arg: {\"path\": \"/ci/orlo-client/orlo-client-windows-${{ github.sha }}.tar.gz\"}" \
            -o orlo-client-windows.tar.gz
          mkdir -p dist/
          tar xzf orlo-client-windows.tar.gz -C dist/

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "HEAD~10")
          LOG=$(git log --pretty=format:'- %s (%h)' "$PREV_TAG..HEAD" | head -30)
          {
            echo "changelog<<CHANGELOG_EOF"
            echo "## What's Changed"
            echo ""
            echo "$LOG"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: Orlo Client ${{ needs.version.outputs.tag }}
          make_latest: true
          body: |
            ${{ steps.changelog.outputs.changelog }}

            ## Downloads
            - **Windows**: `OrloClient-Windows-${{ needs.version.outputs.version }}.zip`
          files: |
            dist/OrloClient-Windows-${{ needs.version.outputs.version }}.zip
          draft: false
          prerelease: false

  publish-cdn:
    name: Publish to Hetzner S3
    needs: [version, build-windows, release]
    runs-on: ubuntu-latest
    if: always() && needs.build-windows.result == 'success'
    env:
      VERSION: ${{ needs.version.outputs.version }}
      AWS_ACCESS_KEY_ID: ${{ secrets.HETZNER_S3_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.HETZNER_S3_SECRET_KEY }}
      AWS_DEFAULT_REGION: fsn1
    steps:
      - name: Download orlo-client-files from Dropbox
        env:
          DROPBOX_ACCESS_TOKEN: ${{ secrets.DROPBOX_ACCESS_TOKEN }}
        run: |
          curl -X POST https://content.dropboxapi.com/2/files/download \
            --header "Authorization: Bearer $DROPBOX_ACCESS_TOKEN" \
            --header "Dropbox-API-Arg: {\"path\": \"/ci/orlo-client/orlo-client-files-${{ github.sha }}.tar.gz\"}" \
            -o orlo-client-files.tar.gz
          mkdir -p build-files/
          tar xzf orlo-client-files.tar.gz -C build-files/

      - name: Download orlo-client-manifest from Dropbox
        env:
          DROPBOX_ACCESS_TOKEN: ${{ secrets.DROPBOX_ACCESS_TOKEN }}
        run: |
          curl -X POST https://content.dropboxapi.com/2/files/download \
            --header "Authorization: Bearer $DROPBOX_ACCESS_TOKEN" \
            --header "Dropbox-API-Arg: {\"path\": \"/ci/orlo-client/orlo-client-manifest-${{ github.sha }}.tar.gz\"}" \
            -o orlo-client-manifest.tar.gz
          tar xzf orlo-client-manifest.tar.gz

      - name: Download orlo-client-windows from Dropbox
        env:
          DROPBOX_ACCESS_TOKEN: ${{ secrets.DROPBOX_ACCESS_TOKEN }}
        run: |
          curl -X POST https://content.dropboxapi.com/2/files/download \
            --header "Authorization: Bearer $DROPBOX_ACCESS_TOKEN" \
            --header "Dropbox-API-Arg: {\"path\": \"/ci/orlo-client/orlo-client-windows-${{ github.sha }}.tar.gz\"}" \
            -o orlo-client-windows.tar.gz
          mkdir -p dist/
          tar xzf orlo-client-windows.tar.gz -C dist/

      - name: Install AWS CLI
        run: |
          if ! command -v aws &> /dev/null; then
            curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
            unzip -q awscliv2.zip
            sudo ./aws/install
          fi

      - name: Upload individual files to Hetzner S3
        run: |
          echo "Uploading client files for version ${VERSION}..."
          aws s3 sync build-files/ "s3://${S3_BUCKET}/client/files/${VERSION}/" \
            --endpoint-url "${S3_ENDPOINT}" \
            --no-progress
          echo "All files uploaded for version ${VERSION}"

      - name: Upload zip fallback
        run: |
          aws s3 cp \
            "dist/OrloClient-Windows-${VERSION}.zip" \
            "s3://${S3_BUCKET}/client/releases/${VERSION}/OrloClient-Windows-${VERSION}.zip" \
            --endpoint-url "${S3_ENDPOINT}" \
            --no-progress

      - name: Verify critical files exist before publishing manifest
        run: |
          echo "Verifying key files on S3..."
          MISSING=0
          for CHECK in "OrloClient.exe" "UnityPlayer.dll"; do
            if aws s3api head-object \
              --bucket "${S3_BUCKET}" \
              --key "client/files/${VERSION}/${CHECK}" \
              --endpoint-url "${S3_ENDPOINT}" 2>/dev/null; then
              echo "  OK: ${CHECK}"
            else
              echo "  MISSING: ${CHECK}"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "ERROR: Critical files missing on S3!"
            exit 1
          fi

      - name: Publish manifest (LAST — after files verified)
        run: |
          echo "Publishing manifest for v${VERSION}..."
          aws s3 cp manifest.json "s3://${S3_BUCKET}/client/manifest.json" \
            --endpoint-url "${S3_ENDPOINT}" \
            --content-type "application/json" \
            --cache-control "public, max-age=30" \
            --no-progress
          echo "Manifest published to Hetzner S3"

      - name: Purge old client releases (>7 days)
        run: |
          echo "Purging client releases older than 7 days..."
          CUTOFF=$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u -v-7d +%Y-%m-%dT%H:%M:%SZ)

          for PREFIX in "client/files/" "client/releases/"; do
            # List version folders
            VERSIONS=$(aws s3api list-objects-v2 \
              --bucket "${S3_BUCKET}" \
              --prefix "${PREFIX}" \
              --delimiter "/" \
              --endpoint-url "${S3_ENDPOINT}" \
              --query "CommonPrefixes[].Prefix" \
              --output text 2>/dev/null || echo "")

            if [ -z "$VERSIONS" ]; then
              echo "  No versions found under ${PREFIX}"
              continue
            fi

            # Count total versions (never delete the last one)
            TOTAL=$(echo "$VERSIONS" | wc -w)
            DELETED=0

            for VER_PREFIX in $VERSIONS; do
              # Skip latest pointers
              echo "$VER_PREFIX" | grep -q "latest/" && continue

              # Check age of first object in this version
              LAST_MOD=$(aws s3api list-objects-v2 \
                --bucket "${S3_BUCKET}" \
                --prefix "${VER_PREFIX}" \
                --max-items 1 \
                --endpoint-url "${S3_ENDPOINT}" \
                --query "Contents[0].LastModified" \
                --output text 2>/dev/null || echo "")

              if [ -z "$LAST_MOD" ] || [ "$LAST_MOD" = "None" ]; then
                continue
              fi

              # Compare dates (keep if newer than cutoff)
              if [[ "$LAST_MOD" < "$CUTOFF" ]]; then
                # Safety: keep at least 1 version
                REMAINING=$((TOTAL - DELETED))
                if [ "$REMAINING" -le 1 ]; then
                  echo "  Keeping ${VER_PREFIX} (last remaining version)"
                  continue
                fi

                echo "  Purging ${VER_PREFIX} (older than 7 days)"
                aws s3 rm "s3://${S3_BUCKET}/${VER_PREFIX}" \
                  --recursive \
                  --endpoint-url "${S3_ENDPOINT}" \
                  --quiet
                DELETED=$((DELETED + 1))
              fi
            done

            echo "  ${PREFIX}: purged ${DELETED} old versions"
          done

      - name: Register version with updater-api
        if: always()
        run: |
          MANIFEST_URL="https://orlo-cdn.fsn1.your-objectstorage.com/client/manifest.json"
          TOTAL_SIZE=$(cat manifest.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('total_size',0))" 2>/dev/null || echo "0")
          FILES_COUNT=$(cat manifest.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('total_files',0))" 2>/dev/null || echo "0")

          # Generate changelog
          NOTES=$(git log --pretty=format:'- %s' HEAD~5..HEAD 2>/dev/null | head -10 || echo "Automated release")

          curl -s -X POST "https://updater.orlo.games/admin/client/publish" \
            -H "Content-Type: application/json" \
            -H "X-Admin-Key: ${{ secrets.UPDATER_ADMIN_KEY }}" \
            -d "{
              \"version\": \"${VERSION}\",
              \"channel\": \"stable\",
              \"manifest_url\": \"${MANIFEST_URL}\",
              \"total_size\": ${TOTAL_SIZE},
              \"files_count\": ${FILES_COUNT},
              \"notes\": \"${NOTES}\"
            }" && echo "Registered v${VERSION} with updater-api" \
            || echo "WARNING: Failed to register with updater-api (non-fatal)"
