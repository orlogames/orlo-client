name: Release — Client Build & Publish

on:
  push:
    branches: [main]
    tags:
      - 'v*'          # Triggered by version tags (e.g. v0.2.0)
  repository_dispatch:
    types: [proto-updated]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 0.2.0) — leave blank for auto from run_number'
        required: false
        type: string

permissions:
  contents: write

jobs:
  version:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - id: ver
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
            VER="${TAG#v}"
          elif [ -n "${{ inputs.version }}" ]; then
            VER="${{ inputs.version }}"
            TAG="v$VER"
          else
            VER="0.0.${{ github.run_number }}"
            TAG="v$VER"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Version: $VER, Tag: $TAG"

  build-windows:
    name: Build Windows
    needs: version
    runs-on: [self-hosted, windows]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Checkout orlo-proto
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/orlo-proto
          path: orlo-proto
          token: ${{ secrets.GH_PAT }}

      - name: Install protoc
        shell: powershell
        run: |
          $version = "29.3"
          $url = "https://github.com/protocolbuffers/protobuf/releases/download/v$version/protoc-$version-win64.zip"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\protoc.zip"
          Expand-Archive -Path "$env:TEMP\protoc.zip" -DestinationPath "$env:TEMP\protoc" -Force
          echo "$env:TEMP\protoc\bin" >> $env:GITHUB_PATH

      - name: Generate C# proto sources
        shell: powershell
        run: |
          $protoDir = "orlo-proto/proto"
          $outDir = "Assets/Scripts/Proto"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          $protos = Get-ChildItem "$protoDir/orlo" -Filter "*.proto" | ForEach-Object { "orlo/$($_.Name)" }
          & protoc --proto_path=$protoDir --csharp_out=$outDir @protos
          Write-Host "Generated C# files:"
          Get-ChildItem $outDir

      - name: Write version file
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path Assets/Resources | Out-Null
          "${{ needs.version.outputs.version }}" | Out-File -FilePath Assets/Resources/version.txt -Encoding utf8

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Windows-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: Library-Windows-

      - name: Build with Unity
        shell: powershell
        run: |
          $unity = "C:\Program Files\Unity\Hub\Editor\6000.0.71f1\Editor\Unity.exe"
          $proc = Start-Process -FilePath $unity -ArgumentList @(
            '-batchmode', '-nographics', '-quit', '-projectPath', '.',
            '-buildTarget', 'StandaloneWindows64',
            '-executeMethod', 'BuildScript.Build',
            '-logFile', 'build-log.txt',
            '-buildPath', 'build/windows/OrloClient.exe'
          ) -Wait -PassThru -NoNewWindow
          if ($proc.ExitCode -ne 0) {
            if (Test-Path build-log.txt) { Get-Content build-log.txt -Tail 50 }
            exit 1
          }

      - name: Create zip
        shell: powershell
        run: |
          Compress-Archive -Path build/windows/* -DestinationPath "OrloClient-Windows-${{ needs.version.outputs.version }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: orlo-client-windows
          path: OrloClient-Windows-${{ needs.version.outputs.version }}.zip
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: [version, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: orlo-client-windows
          path: dist/

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "HEAD~10")
          LOG=$(git log --pretty=format:'- %s (%h)' "$PREV_TAG..HEAD" | head -30)
          {
            echo "changelog<<CHANGELOG_EOF"
            echo "## What's Changed"
            echo ""
            echo "$LOG"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create tag if not exists
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: Orlo Client ${{ needs.version.outputs.tag }}
          body: |
            ${{ steps.changelog.outputs.changelog }}

            ## Downloads
            - **Windows**: `OrloClient-Windows-${{ needs.version.outputs.version }}.zip`

            ## Auto-update
            Run `update-client.ps1` in your dev environment to auto-download the latest release.
          files: |
            dist/OrloClient-Windows-${{ needs.version.outputs.version }}.zip
          draft: false
          prerelease: false

  publish-cdn:
    name: Publish to CDN (Cloudflare R2)
    needs: [version, build-windows, release]
    runs-on: ubuntu-latest
    if: always() && needs.build-windows.result == 'success'
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: orlo-client-windows
          path: dist/

      - name: Compute SHA-256 hash and file size
        id: meta
        run: |
          WIN_FILE="dist/OrloClient-Windows-${VERSION}.zip"
          WIN_SHA256=$(sha256sum "$WIN_FILE" | awk '{print $1}')
          WIN_SIZE=$(stat --format=%s "$WIN_FILE")
          echo "win_sha256=$WIN_SHA256" >> "$GITHUB_OUTPUT"
          echo "win_size=$WIN_SIZE" >> "$GITHUB_OUTPUT"

      - name: Generate release notes from changelog
        id: notes
        run: |
          NOTES=$(gh release view "v${VERSION}" --repo "${{ github.repository }}" --json body -q '.body' 2>/dev/null || echo "Release ${VERSION}")
          NOTES_ESCAPED=$(echo "$NOTES" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')
          echo "release_notes=$NOTES_ESCAPED" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate manifest.json
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          cat > manifest.json << MANIFEST_EOF
          {
            "latest": "${VERSION}",
            "channels": {
              "stable": {
                "version": "${VERSION}",
                "platforms": {
                  "windows": {
                    "url": "https://cdn.orlo.games/client/releases/${VERSION}/OrloClient-Windows-${VERSION}.zip",
                    "sha256": "${{ steps.meta.outputs.win_sha256 }}",
                    "size": ${{ steps.meta.outputs.win_size }},
                    "filename": "OrloClient-Windows-${VERSION}.zip"
                  }
                },
                "release_notes": ${{ steps.notes.outputs.release_notes }},
                "released_at": "${TIMESTAMP}",
                "min_launcher_version": "0.0.1"
              }
            }
          }
          MANIFEST_EOF

          python3 -c "
          import json
          with open('manifest.json') as f:
              data = json.load(f)
          with open('manifest.json', 'w') as f:
              json.dump(data, f, indent=2)
          "

          echo "Generated manifest.json:"
          cat manifest.json

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Upload Windows build to R2
        run: |
          wrangler r2 object put "orlo-cdn/client/releases/${VERSION}/OrloClient-Windows-${VERSION}.zip" \
            --file="dist/OrloClient-Windows-${VERSION}.zip"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload manifest.json to R2
        run: |
          wrangler r2 object put "orlo-cdn/client/manifest.json" \
            --file="manifest.json"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
