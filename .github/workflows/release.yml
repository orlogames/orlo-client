name: Release — Client Build & Publish

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  repository_dispatch:
    types: [proto-updated]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 0.2.0) — leave blank for auto from run_number'
        required: false
        type: string

permissions:
  contents: write

jobs:
  version:
    name: Determine Version
    runs-on: [self-hosted, linux]
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - id: ver
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
            VER="${TAG#v}"
          elif [ -n "${{ inputs.version }}" ]; then
            VER="${{ inputs.version }}"
            TAG="v$VER"
          else
            VER="0.0.${{ github.run_number }}"
            TAG="v$VER"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Version: $VER, Tag: $TAG"

  build-windows:
    name: Build Windows
    needs: version
    runs-on: [self-hosted, client]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Checkout orlo-proto
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/orlo-proto
          path: orlo-proto
          token: ${{ secrets.GH_PAT }}

      - name: Install protoc
        shell: powershell
        run: |
          $version = "29.3"
          $url = "https://github.com/protocolbuffers/protobuf/releases/download/v$version/protoc-$version-win64.zip"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\protoc.zip"
          Expand-Archive -Path "$env:TEMP\protoc.zip" -DestinationPath "$env:TEMP\protoc" -Force
          echo "$env:TEMP\protoc\bin" >> $env:GITHUB_PATH

      - name: Generate C# proto sources
        shell: powershell
        run: |
          $protoDir = "orlo-proto/proto"
          $outDir = "Assets/Scripts/Proto"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          $protos = Get-ChildItem "$protoDir/orlo" -Filter "*.proto" | ForEach-Object { "orlo/$($_.Name)" }
          & protoc --proto_path=$protoDir --csharp_out=$outDir @protos
          Write-Host "Generated C# files:"
          Get-ChildItem $outDir

      - name: Write version file
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path Assets/Resources | Out-Null
          "${{ needs.version.outputs.version }}" | Out-File -FilePath Assets/Resources/version.txt -Encoding utf8

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Windows-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: Library-Windows-

      - name: Find Unity installation (pinned to ProjectVersion.txt)
        id: unity
        shell: powershell
        run: |
          # The editor version MUST match the project pin - a newer 6000.x on the
          # runner compiles against a different URP and breaks overrides
          # (6000.4 vs pinned 6000.0.5f1 broke FrostedGlassFeature, 2026-07-02).
          $pin = (Get-Content ProjectSettings/ProjectVersion.txt | Select-String '^m_EditorVersion:').ToString().Split(' ')[1].Trim()
          Write-Host "Project pins Unity $pin"
          $searchPaths = @(
            "C:\Program Files\Unity\Hub\Editor\$pin\Editor\Unity.exe",
            "F:\Unity\$pin\Editor\Unity.exe",
            "D:\Unity\$pin\Editor\Unity.exe"
          )
          $unity = $null
          foreach ($p in $searchPaths) {
            if (Test-Path $p) { $unity = $p; break }
          }
          if (-not $unity) {
            $installed = Get-Item "C:\Program Files\Unity\Hub\Editor\*" -ErrorAction SilentlyContinue | ForEach-Object { $_.Name }
            throw "Unity $pin not installed on this runner (found: $($installed -join ', ')). Install the pinned version via Unity Hub - do NOT build with a mismatched editor."
          }
          Write-Host "Found Unity at: $unity"
          echo "path=$unity" >> $env:GITHUB_OUTPUT

      # Assets are delivered independently via content manifest — not bundled in client builds

      - name: Activate Unity (Personal)
        shell: pwsh
        env:
          UNITY_LICENSE_ULF: ${{ secrets.UNITY_LICENSE_ULF }}
        run: |
          if (-not $env:UNITY_LICENSE_ULF) {
            throw "UNITY_LICENSE_ULF secret is not set"
          }
          $licDir = Join-Path $env:LOCALAPPDATA "Unity\licenses"
          New-Item -ItemType Directory -Force -Path $licDir | Out-Null
          $licPath = Join-Path $licDir "UnityEntitlementLicense.xml"
          [IO.File]::WriteAllBytes($licPath, [Convert]::FromBase64String($env:UNITY_LICENSE_ULF))
          Write-Host "Wrote Unity license to $licPath ($((Get-Item $licPath).Length) bytes)"

      - name: Build with Unity
        shell: powershell
        run: |
          $unity = "${{ steps.unity.outputs.path }}"
          $proc = Start-Process -FilePath $unity -ArgumentList @(
            '-batchmode', '-nographics', '-quit', '-projectPath', '.',
            '-buildTarget', 'StandaloneWindows64',
            '-executeMethod', 'BuildScript.Build',
            '-logFile', 'build-log.txt',
            '-buildPath', 'build/windows/OrloClient.exe'
          ) -Wait -PassThru -NoNewWindow
          if ($proc.ExitCode -ne 0) {
            if (Test-Path build-log.txt) {
              Write-Host "=== COMPILATION ERRORS ==="
              Select-String -Path build-log.txt -Pattern "error CS|error:|CompilerError" | Select-Object -First 30 | ForEach-Object { Write-Host $_.Line }
              Write-Host "=== LAST 100 LINES ==="
              Get-Content build-log.txt -Tail 100
            }
            exit 1
          }

      - name: Deactivate / cleanup Unity license
        if: always()
        shell: pwsh
        run: |
          $licPath = Join-Path $env:LOCALAPPDATA "Unity\licenses\UnityEntitlementLicense.xml"
          if (Test-Path $licPath) {
            Remove-Item $licPath -Force -ErrorAction SilentlyContinue
            Write-Host "Removed Unity license file"
          }

      - name: Generate file manifest
        shell: powershell
        run: |
          python scripts/generate_manifest.py `
            --build-dir build/windows `
            --version "${{ needs.version.outputs.version }}" `
            --output build/manifest.json

      - name: Create zip (fallback)
        shell: powershell
        run: |
          Compress-Archive -Path build/windows/* -DestinationPath "OrloClient-Windows-${{ needs.version.outputs.version }}.zip"

      - name: Upload CI artifacts to S3
        shell: pwsh
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.HETZNER_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.HETZNER_S3_SECRET_KEY }}
          AWS_DEFAULT_REGION: fsn1
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
        run: |
          $sha = "${{ github.sha }}"
          $zipFile = "OrloClient-Windows-${{ needs.version.outputs.version }}.zip"

          # Upload client zip
          tar czf orlo-client-windows.tar.gz $zipFile
          aws s3 cp orlo-client-windows.tar.gz `
            "s3://orlo-cdn/ci/orlo-client/orlo-client-windows-${sha}.tar.gz" `
            --endpoint-url "$env:S3_ENDPOINT"

          # Upload loose client files
          tar czf orlo-client-files.tar.gz -C build/windows .
          aws s3 cp orlo-client-files.tar.gz `
            "s3://orlo-cdn/ci/orlo-client/orlo-client-files-${sha}.tar.gz" `
            --endpoint-url "$env:S3_ENDPOINT"

          # Upload manifest
          tar czf orlo-client-manifest.tar.gz -C build manifest.json
          aws s3 cp orlo-client-manifest.tar.gz `
            "s3://orlo-cdn/ci/orlo-client/orlo-client-manifest-${sha}.tar.gz" `
            --endpoint-url "$env:S3_ENDPOINT"

          Write-Host "Uploaded all CI artifacts to S3"

  release:
    name: Create GitHub Release
    needs: [version, build-windows]
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4

      - name: Install AWS CLI
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          if ! command -v aws &> /dev/null; then
            # User-scoped install — self-hosted runners don't grant sudo
            # (broke 2026-07-02 when jobs moved off a passwordless-sudo temp runner).
            # Unpack in RUNNER_TEMP, never the checkout: publish-cdn has no
            # actions/checkout, so nothing ever cleans its workspace and a
            # leftover aws/ made unzip prompt to overwrite and die on EOF
            # (broke 2026-07-11).
            cd "${RUNNER_TEMP:?RUNNER_TEMP is not set}"
            rm -rf aws awscliv2.zip
            curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o awscliv2.zip
            unzip -qo awscliv2.zip
            ./aws/install -i "$HOME/.aws-cli" -b "$HOME/.local/bin" --update
          fi
          # Export unconditionally — the guard above may skip the install, but
          # later steps still need the dir on PATH ($GITHUB_PATH does not persist
          # across jobs, so the guard would otherwise re-download 72MB every job).
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          command -v aws > /dev/null || { echo "aws not on PATH after install"; exit 1; }

      - name: Download orlo-client-windows from S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.HETZNER_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.HETZNER_S3_SECRET_KEY }}
          AWS_DEFAULT_REGION: fsn1
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
        run: |
          aws s3 cp \
            "s3://orlo-cdn/ci/orlo-client/orlo-client-windows-${{ github.sha }}.tar.gz" \
            orlo-client-windows.tar.gz \
            --endpoint-url "$S3_ENDPOINT"
          mkdir -p dist/
          tar xzf orlo-client-windows.tar.gz -C dist/

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "HEAD~10")
          LOG=$(git log --pretty=format:'- %s (%h)' "$PREV_TAG..HEAD" | head -30)
          {
            echo "changelog<<CHANGELOG_EOF"
            echo "## What's Changed"
            echo ""
            echo "$LOG"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: Orlo Client ${{ needs.version.outputs.tag }}
          make_latest: true
          body: |
            ${{ steps.changelog.outputs.changelog }}

            ## Downloads
            - **Windows**: `OrloClient-Windows-${{ needs.version.outputs.version }}.zip`
          files: |
            dist/OrloClient-Windows-${{ needs.version.outputs.version }}.zip
          draft: false
          prerelease: false

  publish-cdn:
    name: Publish to S3
    needs: [version, build-windows, release]
    runs-on: [self-hosted, linux]
    if: always() && needs.build-windows.result == 'success'
    env:
      VERSION: ${{ needs.version.outputs.version }}
      AWS_ACCESS_KEY_ID: ${{ secrets.HETZNER_S3_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.HETZNER_S3_SECRET_KEY }}
      AWS_DEFAULT_REGION: fsn1
      S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
      S3_BUCKET: orlo-cdn
    steps:
      - name: Install AWS CLI
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          if ! command -v aws &> /dev/null; then
            # User-scoped install — self-hosted runners don't grant sudo
            # (broke 2026-07-02 when jobs moved off a passwordless-sudo temp runner).
            # Unpack in RUNNER_TEMP, never the checkout: publish-cdn has no
            # actions/checkout, so nothing ever cleans its workspace and a
            # leftover aws/ made unzip prompt to overwrite and die on EOF
            # (broke 2026-07-11).
            cd "${RUNNER_TEMP:?RUNNER_TEMP is not set}"
            rm -rf aws awscliv2.zip
            curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o awscliv2.zip
            unzip -qo awscliv2.zip
            ./aws/install -i "$HOME/.aws-cli" -b "$HOME/.local/bin" --update
          fi
          # Export unconditionally — the guard above may skip the install, but
          # later steps still need the dir on PATH ($GITHUB_PATH does not persist
          # across jobs, so the guard would otherwise re-download 72MB every job).
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          command -v aws > /dev/null || { echo "aws not on PATH after install"; exit 1; }

      - name: Download CI artifacts from S3
        run: |
          SHA="${{ github.sha }}"

          # This job has no actions/checkout, so nothing cleans the workspace
          # between runs on a self-hosted runner. Wipe every artifact we are
          # about to recreate: a stale tree would overlay onto the new build and
          # `aws s3 sync` (no --delete) would ship the leftovers into this
          # version's CDN prefix. A stale manifest.json is worse still — the
          # `if: always()` register step below would read it and publish the
          # PREVIOUS release's size/file-count against this version.
          rm -rf client-files dist manifest.json \
                 orlo-client-files.tar.gz orlo-client-manifest.tar.gz orlo-client-windows.tar.gz

          aws s3 cp "s3://${S3_BUCKET}/ci/orlo-client/orlo-client-files-${SHA}.tar.gz" \
            orlo-client-files.tar.gz --endpoint-url "$S3_ENDPOINT"
          mkdir -p client-files/
          tar xzf orlo-client-files.tar.gz -C client-files/

          aws s3 cp "s3://${S3_BUCKET}/ci/orlo-client/orlo-client-manifest-${SHA}.tar.gz" \
            orlo-client-manifest.tar.gz --endpoint-url "$S3_ENDPOINT"
          tar xzf orlo-client-manifest.tar.gz

          aws s3 cp "s3://${S3_BUCKET}/ci/orlo-client/orlo-client-windows-${SHA}.tar.gz" \
            orlo-client-windows.tar.gz --endpoint-url "$S3_ENDPOINT"
          mkdir -p dist/
          tar xzf orlo-client-windows.tar.gz -C dist/

      - name: Upload individual files to S3
        run: |
          echo "Uploading client files for version ${VERSION}..."
          aws s3 sync client-files/ "s3://${S3_BUCKET}/releases/client/${VERSION}/" \
            --endpoint-url "$S3_ENDPOINT"
          echo "Individual files uploaded"

      - name: Upload zip fallback to S3
        run: |
          ZIP_FILE="dist/OrloClient-Windows-${VERSION}.zip"
          aws s3 cp "$ZIP_FILE" \
            "s3://${S3_BUCKET}/releases/client/${VERSION}/OrloClient-Windows-${VERSION}.zip" \
            --endpoint-url "$S3_ENDPOINT"
          echo "Zip fallback uploaded"

      - name: Verify critical files on S3
        run: |
          echo "Verifying key files on S3..."
          MISSING=0
          for CHECK in "OrloClient.exe" "UnityPlayer.dll"; do
            if aws s3 ls "s3://${S3_BUCKET}/releases/client/${VERSION}/${CHECK}" \
                --endpoint-url "$S3_ENDPOINT" > /dev/null 2>&1; then
              echo "  OK: ${CHECK}"
            else
              echo "  MISSING: ${CHECK}"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "ERROR: Critical files missing on S3!"
            exit 1
          fi

      - name: Publish manifest (LAST — after files verified)
        run: |
          echo "Publishing manifest for v${VERSION}..."
          # Versioned copy — used as the canonical manifest_url in updater-api
          aws s3 cp manifest.json \
            "s3://${S3_BUCKET}/releases/client/${VERSION}/manifest.json" \
            --endpoint-url "$S3_ENDPOINT"
          # Rolling pointer — used by launcher as fallback when updater-api is unreachable
          aws s3 cp manifest.json \
            "s3://${S3_BUCKET}/releases/client/manifest.json" \
            --endpoint-url "$S3_ENDPOINT"
          echo "Manifest published to S3 (versioned + rolling pointer)"

      - name: Purge old client releases (keep last 5 versions)
        run: |
          echo "Checking for old versions to purge..."
          VERSIONS=$(aws s3 ls "s3://${S3_BUCKET}/releases/client/" \
            --endpoint-url "$S3_ENDPOINT" | \
            grep PRE | awk '{print $2}' | tr -d '/' | sort -V)
          TOTAL=$(echo "$VERSIONS" | grep -c . || echo 0)

          if [ "$TOTAL" -le 5 ]; then
            echo "  Only ${TOTAL} versions found, nothing to purge (keeping last 5)"
          else
            KEEP=5
            DELETE_COUNT=$((TOTAL - KEEP))
            echo "  Found ${TOTAL} versions, purging oldest ${DELETE_COUNT}..."
            echo "$VERSIONS" | head -n "$DELETE_COUNT" | while read -r OLD_VER; do
              echo "  Purging releases/client/${OLD_VER}/..."
              aws s3 rm "s3://${S3_BUCKET}/releases/client/${OLD_VER}/" \
                --recursive --endpoint-url "$S3_ENDPOINT"
            done
            echo "  Purge complete"
          fi

      - name: Clean up CI artifacts
        run: |
          SHA="${{ github.sha }}"
          echo "Cleaning up CI staging artifacts..."
          aws s3 rm "s3://${S3_BUCKET}/ci/orlo-client/orlo-client-windows-${SHA}.tar.gz" \
            --endpoint-url "$S3_ENDPOINT" || true
          aws s3 rm "s3://${S3_BUCKET}/ci/orlo-client/orlo-client-files-${SHA}.tar.gz" \
            --endpoint-url "$S3_ENDPOINT" || true
          aws s3 rm "s3://${S3_BUCKET}/ci/orlo-client/orlo-client-manifest-${SHA}.tar.gz" \
            --endpoint-url "$S3_ENDPOINT" || true

      - name: Register version with updater-api
        # was `if: always()` — on a failed artifact download that re-ran this step
        # against whatever manifest.json was left in the workspace.
        if: success()
        run: |
          MANIFEST_URL="https://orlo-cdn.fsn1.your-objectstorage.com/releases/client/${VERSION}/manifest.json"
          TOTAL_SIZE=$(python3 -c "import json; print(json.load(open('manifest.json')).get('total_size',0))" 2>/dev/null || echo "0")
          FILES_COUNT=$(python3 -c "import json; print(json.load(open('manifest.json')).get('total_files',0))" 2>/dev/null || echo "0")

          NOTES=$(git log --pretty=format:'- %s' HEAD~5..HEAD 2>/dev/null | head -10 || echo "Automated release")

          # --fail-with-body: plain `curl -s` exits 0 on an HTTP error, so the
          # `|| WARNING` branch below was dead code and this step reported
          # "Registered" even when updater.orlo.games returned 401 (2026-07-11).
          if curl -sS --fail-with-body -X POST "https://updater.orlo.games/admin/client/publish" \
            -H "Content-Type: application/json" \
            -H "X-Admin-Key: ${{ secrets.UPDATER_ADMIN_KEY }}" \
            -d "{
              \"version\": \"${VERSION}\",
              \"channel\": \"stable\",
              \"manifest_url\": \"${MANIFEST_URL}\",
              \"total_size\": ${TOTAL_SIZE},
              \"files_count\": ${FILES_COUNT},
              \"notes\": \"${NOTES}\"
            }"; then
            echo "Registered v${VERSION} with updater-api"
          else
            echo "::warning::Failed to register v${VERSION} with updater-api (non-fatal — launcher falls back to the rolling S3 manifest)"
          fi
