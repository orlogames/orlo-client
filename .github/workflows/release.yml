name: Release — Client Build & Publish

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  repository_dispatch:
    types: [proto-updated]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 0.2.0) — leave blank for auto from run_number'
        required: false
        type: string

permissions:
  contents: write

jobs:
  version:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - id: ver
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
            VER="${TAG#v}"
          elif [ -n "${{ inputs.version }}" ]; then
            VER="${{ inputs.version }}"
            TAG="v$VER"
          else
            VER="0.0.${{ github.run_number }}"
            TAG="v$VER"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Version: $VER, Tag: $TAG"

  build-windows:
    name: Build Windows
    needs: version
    runs-on: [self-hosted, client]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Checkout orlo-proto
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/orlo-proto
          path: orlo-proto
          token: ${{ secrets.GH_PAT }}

      - name: Install protoc
        shell: powershell
        run: |
          $version = "29.3"
          $url = "https://github.com/protocolbuffers/protobuf/releases/download/v$version/protoc-$version-win64.zip"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\protoc.zip"
          Expand-Archive -Path "$env:TEMP\protoc.zip" -DestinationPath "$env:TEMP\protoc" -Force
          echo "$env:TEMP\protoc\bin" >> $env:GITHUB_PATH

      - name: Generate C# proto sources
        shell: powershell
        run: |
          $protoDir = "orlo-proto/proto"
          $outDir = "Assets/Scripts/Proto"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          $protos = Get-ChildItem "$protoDir/orlo" -Filter "*.proto" | ForEach-Object { "orlo/$($_.Name)" }
          & protoc --proto_path=$protoDir --csharp_out=$outDir @protos
          Write-Host "Generated C# files:"
          Get-ChildItem $outDir

      - name: Write version file
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path Assets/Resources | Out-Null
          "${{ needs.version.outputs.version }}" | Out-File -FilePath Assets/Resources/version.txt -Encoding utf8

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Windows-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: Library-Windows-

      - name: Find Unity installation
        id: unity
        shell: powershell
        run: |
          $searchPaths = @(
            "C:\Program Files\Unity\Hub\Editor\6000.*\Editor\Unity.exe",
            "F:\Unity\6000.*\Editor\Unity.exe",
            "D:\Unity\6000.*\Editor\Unity.exe"
          )
          $unity = $null
          foreach ($p in $searchPaths) {
            $found = Get-Item $p -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) { $unity = $found.FullName; break }
          }
          if (-not $unity) { throw "Unity not found in any search path" }
          Write-Host "Found Unity at: $unity"
          echo "path=$unity" >> $env:GITHUB_OUTPUT

      - name: Download asset pak from orlo-assets
        id: pak
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          New-Item -ItemType Directory -Force -Path Assets/StreamingAssets | Out-Null
          Write-Host "Fetching latest assets.pak from orlo-assets workflow artifacts..."

          # Try multiple methods to get the pak
          $pakFound = $false

          # Method 1: gh run download from latest successful pack-upload run
          try {
            $runs = gh run list --repo orlogames/orlo-assets --workflow "Pack & Upload Assets" --status success --limit 1 --json databaseId | ConvertFrom-Json
            if ($runs.Count -gt 0) {
              $runId = $runs[0].databaseId
              Write-Host "Downloading from run $runId..."
              gh run download $runId --repo orlogames/orlo-assets --name assets-pak --dir pak-download
              if (Test-Path "pak-download/assets.pak") {
                Copy-Item "pak-download/assets.pak" "Assets/StreamingAssets/assets.pak"
                $pakFound = $true
              }
            }
          } catch {
            Write-Host "Method 1 failed: $($_.Exception.Message)"
          }

          # Method 2: Try downloading latest artifact by name
          if (-not $pakFound) {
            try {
              gh run download --repo orlogames/orlo-assets --name assets-pak --dir pak-download2
              if (Test-Path "pak-download2/assets.pak") {
                Copy-Item "pak-download2/assets.pak" "Assets/StreamingAssets/assets.pak"
                $pakFound = $true
              }
            } catch {
              Write-Host "Method 2 failed: $($_.Exception.Message)"
            }
          }

          if ($pakFound) {
            $size = (Get-Item "Assets/StreamingAssets/assets.pak").Length
            $sizeMB = [math]::Round($size / 1MB, 1)
            Write-Host "SUCCESS: assets.pak downloaded ($sizeMB MB)"
            echo "has_pak=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "ERROR: Could not download assets.pak — build will have NO 3D models!"
            Write-Host "Players will see procedural fallback geometry (white shapes)."
            Write-Host "Fix: ensure orlo-assets Pack & Upload workflow has run successfully."
            echo "has_pak=false" >> $env:GITHUB_OUTPUT
          }

      - name: Build with Unity
        shell: powershell
        run: |
          $unity = "${{ steps.unity.outputs.path }}"
          $proc = Start-Process -FilePath $unity -ArgumentList @(
            '-batchmode', '-nographics', '-quit', '-projectPath', '.',
            '-buildTarget', 'StandaloneWindows64',
            '-executeMethod', 'BuildScript.Build',
            '-logFile', 'build-log.txt',
            '-buildPath', 'build/windows/OrloClient.exe'
          ) -Wait -PassThru -NoNewWindow
          if ($proc.ExitCode -ne 0) {
            if (Test-Path build-log.txt) { Get-Content build-log.txt -Tail 50 }
            exit 1
          }

      - name: Generate file manifest
        shell: powershell
        run: |
          python scripts/generate_manifest.py `
            --build-dir build/windows `
            --version "${{ needs.version.outputs.version }}" `
            --output build/manifest.json

      - name: Create zip (fallback)
        shell: powershell
        run: |
          Compress-Archive -Path build/windows/* -DestinationPath "OrloClient-Windows-${{ needs.version.outputs.version }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: orlo-client-windows
          path: OrloClient-Windows-${{ needs.version.outputs.version }}.zip
          retention-days: 30

      - uses: actions/upload-artifact@v4
        with:
          name: orlo-client-files
          path: build/windows/
          retention-days: 7

      - uses: actions/upload-artifact@v4
        with:
          name: orlo-client-manifest
          path: build/manifest.json
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: [version, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: orlo-client-windows
          path: dist/

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "HEAD~10")
          LOG=$(git log --pretty=format:'- %s (%h)' "$PREV_TAG..HEAD" | head -30)
          {
            echo "changelog<<CHANGELOG_EOF"
            echo "## What's Changed"
            echo ""
            echo "$LOG"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create tag if not exists
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: Orlo Client ${{ needs.version.outputs.tag }}
          body: |
            ${{ steps.changelog.outputs.changelog }}

            ## Downloads
            - **Windows**: `OrloClient-Windows-${{ needs.version.outputs.version }}.zip`
          files: |
            dist/OrloClient-Windows-${{ needs.version.outputs.version }}.zip
          draft: false
          prerelease: false

  publish-cdn:
    name: Publish to CDN (Cloudflare R2)
    needs: [version, build-windows, release]
    runs-on: ubuntu-latest
    if: always() && needs.build-windows.result == 'success'
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: orlo-client-files
          path: build-files/

      - uses: actions/download-artifact@v4
        with:
          name: orlo-client-manifest
          path: .

      - uses: actions/download-artifact@v4
        with:
          name: orlo-client-windows
          path: dist/

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Upload individual files to R2
        run: |
          echo "Uploading individual files for version ${VERSION}..."
          cd build-files
          find . -type f | while IFS= read -r file; do
            REL="${file#./}"
            echo "  uploading: ${REL}"
            wrangler r2 object put "orlo-cdn/client/files/${VERSION}/${REL}" \
              --file="${file}" 2>/dev/null
          done
          cd ..
          echo "All files uploaded for version ${VERSION}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload zip fallback to R2
        run: |
          wrangler r2 object put "orlo-cdn/client/releases/${VERSION}/OrloClient-Windows-${VERSION}.zip" \
            --file="dist/OrloClient-Windows-${VERSION}.zip"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify files exist on R2 before publishing manifest
        run: |
          echo "Verifying key files are accessible on R2..."
          # Check a few critical files exist by listing them
          MISSING=0
          for CHECK_FILE in "OrloClient.exe" "UnityPlayer.dll" "OrloClient_Data/boot.config"; do
            RESULT=$(wrangler r2 object head "orlo-cdn/client/files/${VERSION}/${CHECK_FILE}" 2>&1 || true)
            if echo "$RESULT" | grep -q "error\|not found\|NoSuchKey"; then
              echo "MISSING: ${CHECK_FILE}"
              MISSING=$((MISSING + 1))
            else
              echo "  OK: ${CHECK_FILE}"
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "WARNING: $MISSING critical files not found on R2. Retrying upload..."
            # Re-upload any missing files
            cd build-files
            find . -type f | while IFS= read -r file; do
              REL="${file#./}"
              wrangler r2 object put "orlo-cdn/client/files/${VERSION}/${REL}" \
                --file="${file}" 2>/dev/null
            done
            cd ..
          fi
          echo "File verification complete"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload manifest to R2 (LAST — after files verified)
        run: |
          echo "Publishing v2 manifest for version ${VERSION}..."
          cat manifest.json | head -5
          wrangler r2 object put "orlo-cdn/client/manifest.json" \
            --file="manifest.json"
          echo "Manifest published to R2"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # Deploy manifest to infra server so launchers can see it at api.orlo.games.
  # Tries self-hosted Linux runner first (inside firewall), falls back to
  # direct R2 serving if SCP fails.
  deploy-manifest:
    name: Deploy Manifest to Infra
    needs: [version, publish-cdn]
    runs-on: [self-hosted, linux]
    if: always() && needs.publish-cdn.result == 'success'
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: orlo-client-manifest
          path: .

      - name: Deploy manifest to infra server via SCP
        id: scp
        run: |
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          # Use timeout to prevent hanging on SSH connection
          timeout 30 scp -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 \
            -i /tmp/deploy_key \
            manifest.json \
            root@${{ vars.INFRA_SERVER_IP }}:/opt/orlo/cdn/client/manifest.json \
            && echo "status=success" >> "$GITHUB_OUTPUT" \
            || echo "status=failed" >> "$GITHUB_OUTPUT"

          rm -f /tmp/deploy_key

      - name: Report deployment status
        run: |
          if [ "${{ steps.scp.outputs.status }}" = "success" ]; then
            echo "V2 manifest (v${VERSION}) deployed to infra server"
          else
            echo "WARNING: SCP to infra failed. Manifest is available on R2 CDN."
            echo "Launchers will still get updates via R2 if Caddy is configured to proxy."
            echo "Manual fix: SSH to infra and run:"
            echo "  curl -o /opt/orlo/cdn/client/manifest.json https://cdn.orlo.games/client/manifest.json"
          fi
