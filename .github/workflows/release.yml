name: Release — Client Build & Publish

on:
  push:
    tags:
      - 'v*'          # Triggered by version tags (e.g. v0.2.0)
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 0.2.0) — leave blank for auto from date'
        required: false
        type: string

permissions:
  contents: write

jobs:
  version:
    name: Determine Version
    runs-on: [self-hosted, windows]
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - id: ver
        shell: powershell
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $TAG = "${{ github.ref_name }}"
            $VER = $TAG -replace '^v', ''
          } elseif ("${{ inputs.version }}" -ne "") {
            $VER = "${{ inputs.version }}"
            $TAG = "v$VER"
          } else {
            $VER = "0.0.$(Get-Date -Format 'yyyyMMddHHmm')"
            $TAG = "v$VER"
          }
          echo "version=$VER" >> $env:GITHUB_OUTPUT
          echo "tag=$TAG" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $VER, Tag: $TAG"

  build-windows:
    name: Build Windows
    needs: version
    runs-on: [self-hosted, windows]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Checkout orlo-proto
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/orlo-proto
          path: orlo-proto
          token: ${{ secrets.GH_PAT }}

      - name: Install protoc
        shell: powershell
        run: choco install protoc --yes

      - name: Generate C# proto sources
        shell: pwsh
        run: |
          $protoDir = "orlo-proto/proto"
          $outDir = "Assets/Scripts/Proto/Generated"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          $protos = Get-ChildItem "$protoDir/orlo" -Filter "*.proto" | ForEach-Object { "orlo/$($_.Name)" }
          & protoc --proto_path=$protoDir --csharp_out=$outDir @protos
          Write-Host "Generated C# files:"
          Get-ChildItem $outDir

      - name: Write version file
        shell: powershell
        run: |
          "${{ needs.version.outputs.version }}" | Out-File -FilePath Assets/Resources/version.txt -Encoding utf8

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Windows-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: Library-Windows-

      - name: Build with Unity
        shell: pwsh
        run: |
          $unity = "C:\Program Files\Unity\Hub\Editor\6000.4.0f1\Editor\Unity.exe"
          $proc = Start-Process -FilePath $unity -ArgumentList @(
            '-batchmode', '-nographics', '-quit', '-projectPath', '.',
            '-buildTarget', 'StandaloneWindows64',
            '-executeMethod', 'BuildScript.Build',
            '-logFile', 'build-log.txt',
            '-buildPath', 'build/windows/OrloClient.exe'
          ) -Wait -PassThru -NoNewWindow
          if ($proc.ExitCode -ne 0) {
            if (Test-Path build-log.txt) { Get-Content build-log.txt -Tail 50 }
            exit 1
          }

      - name: Create zip
        shell: powershell
        run: |
          Compress-Archive -Path build/windows/* -DestinationPath "OrloClient-Windows-${{ needs.version.outputs.version }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: orlo-client-windows
          path: OrloClient-Windows-${{ needs.version.outputs.version }}.zip
          retention-days: 30

  build-linux:
    name: Build Linux
    needs: version
    runs-on: [self-hosted, windows]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Checkout orlo-proto
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/orlo-proto
          path: orlo-proto
          token: ${{ secrets.GH_PAT }}

      - name: Install protoc
        shell: powershell
        run: choco install protoc --yes

      - name: Generate C# proto sources
        shell: pwsh
        run: |
          $protoDir = "orlo-proto/proto"
          $outDir = "Assets/Scripts/Proto/Generated"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          $protos = Get-ChildItem "$protoDir/orlo" -Filter "*.proto" | ForEach-Object { "orlo/$($_.Name)" }
          & protoc --proto_path=$protoDir --csharp_out=$outDir @protos
          Write-Host "Generated C# files:"
          Get-ChildItem $outDir

      - name: Write version file
        shell: powershell
        run: |
          "${{ needs.version.outputs.version }}" | Out-File -FilePath Assets/Resources/version.txt -Encoding utf8

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Linux-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: Library-Linux-

      - name: Build with Unity
        shell: pwsh
        run: |
          $unity = "C:\Program Files\Unity\Hub\Editor\6000.4.0f1\Editor\Unity.exe"
          $proc = Start-Process -FilePath $unity -ArgumentList @(
            '-batchmode', '-nographics', '-quit', '-projectPath', '.',
            '-buildTarget', 'StandaloneLinux64',
            '-executeMethod', 'BuildScript.Build',
            '-logFile', 'build-log.txt',
            '-buildPath', 'build/linux/OrloClient'
          ) -Wait -PassThru -NoNewWindow
          if ($proc.ExitCode -ne 0) {
            if (Test-Path build-log.txt) { Get-Content build-log.txt -Tail 50 }
            exit 1
          }

      - name: Create tarball
        shell: powershell
        run: |
          tar czf "OrloClient-Linux-${{ needs.version.outputs.version }}.tar.gz" -C build/linux .

      - uses: actions/upload-artifact@v4
        with:
          name: orlo-client-linux
          path: OrloClient-Linux-${{ needs.version.outputs.version }}.tar.gz
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: [version, build-windows, build-linux]
    runs-on: [self-hosted, windows]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: orlo-client-windows
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: orlo-client-linux
          path: dist/

      - name: Generate changelog
        id: changelog
        shell: powershell
        run: |
          $prevTag = git describe --tags --abbrev=0 2>$null
          if (-not $prevTag) { $prevTag = "HEAD~10" }
          $log = git log --pretty=format:'- %s (%h)' "$prevTag..HEAD" | Select-Object -First 30
          $body = "## What's Changed`n`n$($log -join "`n")"
          echo "changelog<<CHANGELOG_EOF" >> $env:GITHUB_OUTPUT
          echo $body >> $env:GITHUB_OUTPUT
          echo "CHANGELOG_EOF" >> $env:GITHUB_OUTPUT

      - name: Create tag if not exists
        shell: powershell
        run: |
          $TAG = "${{ needs.version.outputs.tag }}"
          $exists = git rev-parse $TAG 2>$null
          if (-not $exists) {
            git tag $TAG
            git push origin $TAG
          }

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: Orlo Client ${{ needs.version.outputs.tag }}
          body: |
            ${{ steps.changelog.outputs.changelog }}

            ## Downloads
            - **Windows**: `OrloClient-Windows-${{ needs.version.outputs.version }}.zip`
            - **Linux**: `OrloClient-Linux-${{ needs.version.outputs.version }}.tar.gz`

            ## Auto-update
            Run `update-client.ps1` in your dev environment to auto-download the latest release.
          files: |
            dist/OrloClient-Windows-${{ needs.version.outputs.version }}.zip
            dist/OrloClient-Linux-${{ needs.version.outputs.version }}.tar.gz
          draft: false
          prerelease: false
