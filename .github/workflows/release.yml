name: Release — Client Build & Publish

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  repository_dispatch:
    types: [proto-updated, assets-updated]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 0.2.0) — leave blank for auto from run_number'
        required: false
        type: string

permissions:
  contents: write

jobs:
  version:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - id: ver
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
            VER="${TAG#v}"
          elif [ -n "${{ inputs.version }}" ]; then
            VER="${{ inputs.version }}"
            TAG="v$VER"
          else
            VER="0.0.${{ github.run_number }}"
            TAG="v$VER"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Version: $VER, Tag: $TAG"

  build-windows:
    name: Build Windows
    needs: version
    runs-on: [self-hosted, client]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Checkout orlo-proto
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/orlo-proto
          path: orlo-proto
          token: ${{ secrets.GH_PAT }}

      - name: Install protoc
        shell: powershell
        run: |
          $version = "29.3"
          $url = "https://github.com/protocolbuffers/protobuf/releases/download/v$version/protoc-$version-win64.zip"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\protoc.zip"
          Expand-Archive -Path "$env:TEMP\protoc.zip" -DestinationPath "$env:TEMP\protoc" -Force
          echo "$env:TEMP\protoc\bin" >> $env:GITHUB_PATH

      - name: Generate C# proto sources
        shell: powershell
        run: |
          $protoDir = "orlo-proto/proto"
          $outDir = "Assets/Scripts/Proto"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          $protos = Get-ChildItem "$protoDir/orlo" -Filter "*.proto" | ForEach-Object { "orlo/$($_.Name)" }
          & protoc --proto_path=$protoDir --csharp_out=$outDir @protos
          Write-Host "Generated C# files:"
          Get-ChildItem $outDir

      - name: Write version file
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path Assets/Resources | Out-Null
          "${{ needs.version.outputs.version }}" | Out-File -FilePath Assets/Resources/version.txt -Encoding utf8

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Windows-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: Library-Windows-

      - name: Find Unity installation
        id: unity
        shell: powershell
        run: |
          $searchPaths = @(
            "C:\Program Files\Unity\Hub\Editor\6000.*\Editor\Unity.exe",
            "F:\Unity\6000.*\Editor\Unity.exe",
            "D:\Unity\6000.*\Editor\Unity.exe"
          )
          $unity = $null
          foreach ($p in $searchPaths) {
            $found = Get-Item $p -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) { $unity = $found.FullName; break }
          }
          if (-not $unity) { throw "Unity not found in any search path" }
          Write-Host "Found Unity at: $unity"
          echo "path=$unity" >> $env:GITHUB_OUTPUT

      - name: Download assets-pak from Dropbox
        id: pak
        shell: bash
        env:
          DROPBOX_ACCESS_TOKEN: ${{ secrets.DROPBOX_ACCESS_TOKEN }}
        run: |
          mkdir -p Assets/StreamingAssets
          echo "Fetching latest assets.pak from Dropbox..."
          PAK_FOUND=false

          curl -s -X POST https://content.dropboxapi.com/2/files/download \
            --header "Authorization: Bearer $DROPBOX_ACCESS_TOKEN" \
            --header "Dropbox-API-Arg: {\"path\": \"/ci/orlo-assets/assets-pak.tar.gz\"}" \
            -o assets-pak.tar.gz

          if [ -f assets-pak.tar.gz ] && [ -s assets-pak.tar.gz ]; then
            mkdir -p pak-download
            tar xzf assets-pak.tar.gz -C pak-download
            if [ -f pak-download/assets.pak ]; then
              cp pak-download/assets.pak Assets/StreamingAssets/assets.pak
              PAK_FOUND=true
            fi
          fi

          if [ "$PAK_FOUND" = "true" ]; then
            SIZE=$(stat -c%s Assets/StreamingAssets/assets.pak 2>/dev/null || stat -f%z Assets/StreamingAssets/assets.pak 2>/dev/null)
            SIZE_MB=$((SIZE / 1048576))
            echo "SUCCESS: assets.pak downloaded (${SIZE_MB} MB)"
            echo "has_pak=true" >> "$GITHUB_OUTPUT"
          else
            echo "ERROR: Could not download assets.pak - build will have NO 3D models!"
            echo "has_pak=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build with Unity
        shell: powershell
        run: |
          $unity = "${{ steps.unity.outputs.path }}"
          $proc = Start-Process -FilePath $unity -ArgumentList @(
            '-batchmode', '-nographics', '-quit', '-projectPath', '.',
            '-buildTarget', 'StandaloneWindows64',
            '-executeMethod', 'BuildScript.Build',
            '-logFile', 'build-log.txt',
            '-buildPath', 'build/windows/OrloClient.exe'
          ) -Wait -PassThru -NoNewWindow
          if ($proc.ExitCode -ne 0) {
            if (Test-Path build-log.txt) { Get-Content build-log.txt -Tail 50 }
            exit 1
          }

      - name: Generate file manifest
        shell: powershell
        run: |
          python scripts/generate_manifest.py `
            --build-dir build/windows `
            --version "${{ needs.version.outputs.version }}" `
            --output build/manifest.json

      - name: Create zip (fallback)
        shell: powershell
        run: |
          Compress-Archive -Path build/windows/* -DestinationPath "OrloClient-Windows-${{ needs.version.outputs.version }}.zip"

      - name: Upload orlo-client-windows to Dropbox
        shell: bash
        env:
          DROPBOX_ACCESS_TOKEN: ${{ secrets.DROPBOX_ACCESS_TOKEN }}
        run: |
          ZIP_FILE="OrloClient-Windows-${{ needs.version.outputs.version }}.zip"
          DROPBOX_PATH="/ci/orlo-client/orlo-client-windows-${{ github.sha }}.tar.gz"
          tar czf orlo-client-windows.tar.gz "$ZIP_FILE"
          curl -X POST https://content.dropboxapi.com/2/files/upload \
            --header "Authorization: Bearer $DROPBOX_ACCESS_TOKEN" \
            --header "Content-Type: application/octet-stream" \
            --header "Dropbox-API-Arg: {\"path\": \"$DROPBOX_PATH\", \"mode\": \"overwrite\"}" \
            --data-binary @orlo-client-windows.tar.gz
          echo "Uploaded client zip to Dropbox"

      - name: Upload orlo-client-files to Dropbox
        shell: bash
        env:
          DROPBOX_ACCESS_TOKEN: ${{ secrets.DROPBOX_ACCESS_TOKEN }}
        run: |
          DROPBOX_PATH="/ci/orlo-client/orlo-client-files-${{ github.sha }}.tar.gz"
          tar czf orlo-client-files.tar.gz -C build/windows .
          curl -X POST https://content.dropboxapi.com/2/files/upload \
            --header "Authorization: Bearer $DROPBOX_ACCESS_TOKEN" \
            --header "Content-Type: application/octet-stream" \
            --header "Dropbox-API-Arg: {\"path\": \"$DROPBOX_PATH\", \"mode\": \"overwrite\"}" \
            --data-binary @orlo-client-files.tar.gz
          echo "Uploaded client files to Dropbox"

      - name: Upload orlo-client-manifest to Dropbox
        shell: bash
        env:
          DROPBOX_ACCESS_TOKEN: ${{ secrets.DROPBOX_ACCESS_TOKEN }}
        run: |
          DROPBOX_PATH="/ci/orlo-client/orlo-client-manifest-${{ github.sha }}.tar.gz"
          tar czf orlo-client-manifest.tar.gz -C build manifest.json
          curl -X POST https://content.dropboxapi.com/2/files/upload \
            --header "Authorization: Bearer $DROPBOX_ACCESS_TOKEN" \
            --header "Content-Type: application/octet-stream" \
            --header "Dropbox-API-Arg: {\"path\": \"$DROPBOX_PATH\", \"mode\": \"overwrite\"}" \
            --data-binary @orlo-client-manifest.tar.gz
          echo "Uploaded manifest to Dropbox"

  release:
    name: Create GitHub Release
    needs: [version, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download orlo-client-windows from Dropbox
        env:
          DROPBOX_ACCESS_TOKEN: ${{ secrets.DROPBOX_ACCESS_TOKEN }}
        run: |
          curl -X POST https://content.dropboxapi.com/2/files/download \
            --header "Authorization: Bearer $DROPBOX_ACCESS_TOKEN" \
            --header "Dropbox-API-Arg: {\"path\": \"/ci/orlo-client/orlo-client-windows-${{ github.sha }}.tar.gz\"}" \
            -o orlo-client-windows.tar.gz
          mkdir -p dist/
          tar xzf orlo-client-windows.tar.gz -C dist/

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "HEAD~10")
          LOG=$(git log --pretty=format:'- %s (%h)' "$PREV_TAG..HEAD" | head -30)
          {
            echo "changelog<<CHANGELOG_EOF"
            echo "## What's Changed"
            echo ""
            echo "$LOG"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: Orlo Client ${{ needs.version.outputs.tag }}
          make_latest: true
          body: |
            ${{ steps.changelog.outputs.changelog }}

            ## Downloads
            - **Windows**: `OrloClient-Windows-${{ needs.version.outputs.version }}.zip`
          files: |
            dist/OrloClient-Windows-${{ needs.version.outputs.version }}.zip
          draft: false
          prerelease: false

  publish-cdn:
    name: Publish to Dropbox
    needs: [version, build-windows, release]
    runs-on: ubuntu-latest
    if: always() && needs.build-windows.result == 'success'
    env:
      VERSION: ${{ needs.version.outputs.version }}
      DROPBOX_ACCESS_TOKEN: ${{ secrets.DROPBOX_ACCESS_TOKEN }}
    steps:
      - name: Download orlo-client-files from Dropbox CI artifacts
        run: |
          curl -X POST https://content.dropboxapi.com/2/files/download \
            --header "Authorization: Bearer $DROPBOX_ACCESS_TOKEN" \
            --header "Dropbox-API-Arg: {\"path\": \"/ci/orlo-client/orlo-client-files-${{ github.sha }}.tar.gz\"}" \
            -o orlo-client-files.tar.gz
          mkdir -p client-files/
          tar xzf orlo-client-files.tar.gz -C client-files/

      - name: Download orlo-client-manifest from Dropbox CI artifacts
        run: |
          curl -X POST https://content.dropboxapi.com/2/files/download \
            --header "Authorization: Bearer $DROPBOX_ACCESS_TOKEN" \
            --header "Dropbox-API-Arg: {\"path\": \"/ci/orlo-client/orlo-client-manifest-${{ github.sha }}.tar.gz\"}" \
            -o orlo-client-manifest.tar.gz
          tar xzf orlo-client-manifest.tar.gz

      - name: Download orlo-client-windows from Dropbox CI artifacts
        run: |
          curl -X POST https://content.dropboxapi.com/2/files/download \
            --header "Authorization: Bearer $DROPBOX_ACCESS_TOKEN" \
            --header "Dropbox-API-Arg: {\"path\": \"/ci/orlo-client/orlo-client-windows-${{ github.sha }}.tar.gz\"}" \
            -o orlo-client-windows.tar.gz
          mkdir -p dist/
          tar xzf orlo-client-windows.tar.gz -C dist/

      - name: Upload individual files to Dropbox
        run: |
          echo "Uploading client files for version ${VERSION}..."
          UPLOADED=0
          FAILED=0
          CHUNK_SIZE=157286400  # 150MB

          for file in $(find client-files/ -type f); do
            relpath="${file#client-files/}"
            FILE_SIZE=$(stat -c%s "$file")
            DROPBOX_PATH="/releases/client/${VERSION}/${relpath}"

            if [ "$FILE_SIZE" -gt "$CHUNK_SIZE" ]; then
              echo "  Large file ($(( FILE_SIZE / 1048576 ))MB): ${relpath} — using upload session"

              # Start upload session
              SESSION_ID=$(curl -s -X POST https://content.dropboxapi.com/2/files/upload_session/start \
                --header "Authorization: Bearer $DROPBOX_ACCESS_TOKEN" \
                --header "Dropbox-API-Arg: {\"close\": false}" \
                --header "Content-Type: application/octet-stream" \
                --data-binary @/dev/null | jq -r '.session_id')

              if [ -z "$SESSION_ID" ] || [ "$SESSION_ID" = "null" ]; then
                echo "  FAILED to start upload session for ${relpath}"
                FAILED=$((FAILED + 1))
                continue
              fi

              # Upload in chunks
              OFFSET=0
              while [ $OFFSET -lt $FILE_SIZE ]; do
                REMAINING=$((FILE_SIZE - OFFSET))
                THIS_CHUNK=$((REMAINING < CHUNK_SIZE ? REMAINING : CHUNK_SIZE))
                dd if="$file" bs=1048576 skip=$((OFFSET / 1048576)) count=$(( (THIS_CHUNK + 1048575) / 1048576 )) 2>/dev/null | \
                  head -c "$THIS_CHUNK" | \
                curl -s -X POST https://content.dropboxapi.com/2/files/upload_session/append_v2 \
                  --header "Authorization: Bearer $DROPBOX_ACCESS_TOKEN" \
                  --header "Dropbox-API-Arg: {\"cursor\": {\"session_id\": \"${SESSION_ID}\", \"offset\": ${OFFSET}}, \"close\": false}" \
                  --header "Content-Type: application/octet-stream" \
                  --data-binary @-
                OFFSET=$((OFFSET + THIS_CHUNK))
              done

              # Finish session
              RESULT=$(curl -s -X POST https://content.dropboxapi.com/2/files/upload_session/finish \
                --header "Authorization: Bearer $DROPBOX_ACCESS_TOKEN" \
                --header "Dropbox-API-Arg: {\"cursor\": {\"session_id\": \"${SESSION_ID}\", \"offset\": ${FILE_SIZE}}, \"commit\": {\"path\": \"${DROPBOX_PATH}\", \"mode\": \"overwrite\"}}" \
                --header "Content-Type: application/octet-stream" \
                --data-binary @/dev/null)

              if echo "$RESULT" | jq -e '.path_display' > /dev/null 2>&1; then
                echo "  OK: ${relpath} ($(( FILE_SIZE / 1048576 ))MB, session upload)"
                UPLOADED=$((UPLOADED + 1))
              else
                echo "  FAILED: ${relpath} — ${RESULT}"
                FAILED=$((FAILED + 1))
              fi
            else
              # Simple upload for files <= 150MB
              RESULT=$(curl -s -X POST https://content.dropboxapi.com/2/files/upload \
                --header "Authorization: Bearer $DROPBOX_ACCESS_TOKEN" \
                --header "Dropbox-API-Arg: {\"path\": \"${DROPBOX_PATH}\", \"mode\": \"overwrite\"}" \
                --header "Content-Type: application/octet-stream" \
                --data-binary @"$file")

              if echo "$RESULT" | jq -e '.path_display' > /dev/null 2>&1; then
                echo "  OK: ${relpath} ($(( FILE_SIZE / 1024 ))KB)"
                UPLOADED=$((UPLOADED + 1))
              else
                echo "  FAILED: ${relpath} — ${RESULT}"
                FAILED=$((FAILED + 1))
              fi
            fi
          done

          echo "Upload complete: ${UPLOADED} succeeded, ${FAILED} failed"
          if [ "$FAILED" -gt 0 ]; then
            echo "ERROR: Some files failed to upload!"
            exit 1
          fi

      - name: Upload zip fallback
        run: |
          ZIP_FILE="dist/OrloClient-Windows-${VERSION}.zip"
          DROPBOX_PATH="/releases/client/${VERSION}/OrloClient-Windows-${VERSION}.zip"
          FILE_SIZE=$(stat -c%s "$ZIP_FILE")
          CHUNK_SIZE=157286400

          if [ "$FILE_SIZE" -gt "$CHUNK_SIZE" ]; then
            echo "Uploading zip via session ($(( FILE_SIZE / 1048576 ))MB)..."
            SESSION_ID=$(curl -s -X POST https://content.dropboxapi.com/2/files/upload_session/start \
              --header "Authorization: Bearer $DROPBOX_ACCESS_TOKEN" \
              --header "Dropbox-API-Arg: {\"close\": false}" \
              --header "Content-Type: application/octet-stream" \
              --data-binary @/dev/null | jq -r '.session_id')

            OFFSET=0
            while [ $OFFSET -lt $FILE_SIZE ]; do
              REMAINING=$((FILE_SIZE - OFFSET))
              THIS_CHUNK=$((REMAINING < CHUNK_SIZE ? REMAINING : CHUNK_SIZE))
              dd if="$ZIP_FILE" bs=1048576 skip=$((OFFSET / 1048576)) count=$(( (THIS_CHUNK + 1048575) / 1048576 )) 2>/dev/null | \
                head -c "$THIS_CHUNK" | \
              curl -s -X POST https://content.dropboxapi.com/2/files/upload_session/append_v2 \
                --header "Authorization: Bearer $DROPBOX_ACCESS_TOKEN" \
                --header "Dropbox-API-Arg: {\"cursor\": {\"session_id\": \"${SESSION_ID}\", \"offset\": ${OFFSET}}, \"close\": false}" \
                --header "Content-Type: application/octet-stream" \
                --data-binary @-
              OFFSET=$((OFFSET + THIS_CHUNK))
            done

            curl -s -X POST https://content.dropboxapi.com/2/files/upload_session/finish \
              --header "Authorization: Bearer $DROPBOX_ACCESS_TOKEN" \
              --header "Dropbox-API-Arg: {\"cursor\": {\"session_id\": \"${SESSION_ID}\", \"offset\": ${FILE_SIZE}}, \"commit\": {\"path\": \"${DROPBOX_PATH}\", \"mode\": \"overwrite\"}}" \
              --header "Content-Type: application/octet-stream" \
              --data-binary @/dev/null
          else
            curl -s -X POST https://content.dropboxapi.com/2/files/upload \
              --header "Authorization: Bearer $DROPBOX_ACCESS_TOKEN" \
              --header "Dropbox-API-Arg: {\"path\": \"${DROPBOX_PATH}\", \"mode\": \"overwrite\"}" \
              --header "Content-Type: application/octet-stream" \
              --data-binary @"$ZIP_FILE"
          fi
          echo "Zip fallback uploaded to Dropbox"

      - name: Verify critical files exist before publishing manifest
        run: |
          echo "Verifying key files on Dropbox..."
          MISSING=0
          for CHECK in "OrloClient.exe" "UnityPlayer.dll"; do
            RESULT=$(curl -s -X POST https://api.dropboxapi.com/2/files/get_metadata \
              --header "Authorization: Bearer $DROPBOX_ACCESS_TOKEN" \
              --header "Content-Type: application/json" \
              --data "{\"path\": \"/releases/client/${VERSION}/${CHECK}\"}")

            if echo "$RESULT" | jq -e '.path_display' > /dev/null 2>&1; then
              SIZE=$(echo "$RESULT" | jq -r '.size')
              echo "  OK: ${CHECK} (${SIZE} bytes)"
            else
              echo "  MISSING: ${CHECK}"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "ERROR: Critical files missing on Dropbox!"
            exit 1
          fi

      - name: Publish manifest (LAST — after files verified)
        run: |
          echo "Publishing manifest for v${VERSION}..."
          curl -s -X POST https://content.dropboxapi.com/2/files/upload \
            --header "Authorization: Bearer $DROPBOX_ACCESS_TOKEN" \
            --header "Dropbox-API-Arg: {\"path\": \"/releases/client/manifest.json\", \"mode\": \"overwrite\"}" \
            --header "Content-Type: application/octet-stream" \
            --data-binary @manifest.json
          echo "Manifest published to Dropbox"

      - name: Purge old client releases (keep last 5 versions)
        run: |
          echo "Checking for old versions to purge..."

          # List folders under /releases/client/
          RESULT=$(curl -s -X POST https://api.dropboxapi.com/2/files/list_folder \
            --header "Authorization: Bearer $DROPBOX_ACCESS_TOKEN" \
            --header "Content-Type: application/json" \
            --data "{\"path\": \"/releases/client\", \"recursive\": false}")

          # Extract version folders (exclude manifest.json), sorted by name
          VERSIONS=$(echo "$RESULT" | jq -r '.entries[] | select(.".tag" == "folder") | .name' | sort -V)
          TOTAL=$(echo "$VERSIONS" | grep -c . || echo 0)

          if [ "$TOTAL" -le 5 ]; then
            echo "  Only ${TOTAL} versions found, nothing to purge (keeping last 5)"
          else
            KEEP=5
            DELETE_COUNT=$((TOTAL - KEEP))
            echo "  Found ${TOTAL} versions, purging oldest ${DELETE_COUNT}..."

            echo "$VERSIONS" | head -n "$DELETE_COUNT" | while read -r OLD_VER; do
              echo "  Purging /releases/client/${OLD_VER}..."
              curl -s -X POST https://api.dropboxapi.com/2/files/delete_v2 \
                --header "Authorization: Bearer $DROPBOX_ACCESS_TOKEN" \
                --header "Content-Type: application/json" \
                --data "{\"path\": \"/releases/client/${OLD_VER}\"}" > /dev/null
            done
            echo "  Purge complete"
          fi

      - name: Register version with updater-api
        if: always()
        run: |
          MANIFEST_URL="dropbox:///releases/client/manifest.json"
          TOTAL_SIZE=$(cat manifest.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('total_size',0))" 2>/dev/null || echo "0")
          FILES_COUNT=$(cat manifest.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('total_files',0))" 2>/dev/null || echo "0")

          # Generate changelog
          NOTES=$(git log --pretty=format:'- %s' HEAD~5..HEAD 2>/dev/null | head -10 || echo "Automated release")

          curl -s -X POST "https://updater.orlo.games/admin/client/publish" \
            -H "Content-Type: application/json" \
            -H "X-Admin-Key: ${{ secrets.UPDATER_ADMIN_KEY }}" \
            -d "{
              \"version\": \"${VERSION}\",
              \"channel\": \"stable\",
              \"manifest_url\": \"${MANIFEST_URL}\",
              \"total_size\": ${TOTAL_SIZE},
              \"files_count\": ${FILES_COUNT},
              \"notes\": \"${NOTES}\"
            }" && echo "Registered v${VERSION} with updater-api" \
            || echo "WARNING: Failed to register with updater-api (non-fatal)"
