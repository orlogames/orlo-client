name: Housekeeping — prune old GitHub Releases

# Weekly cost-control sweep. The S3 release store already keeps only the last 5
# versions (release.yml), but GitHub Releases accumulate unbounded (~38-71 MB
# each). This keeps the newest N releases and deletes older ones — git TAGS are
# preserved, so any pruned release is recreatable from its tag if ever needed.
on:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC
  workflow_dispatch:
    inputs:
      keep:
        description: "How many newest releases to keep"
        required: false
        default: "10"
        type: string
      dry_run:
        description: "true = report only, false = actually delete"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

permissions:
  contents: write   # gh release delete

jobs:
  prune-releases:
    name: Prune GitHub Releases (keep newest N)
    runs-on: ubuntu-latest
    steps:
      - name: Prune
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEEP: ${{ github.event.inputs.keep || '10' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Newest-first by creation time; tag names in that order.
          mapfile -t TAGS < <(gh release list --repo "$REPO" --limit 500 \
            --json tagName,createdAt \
            --jq 'sort_by(.createdAt) | reverse | .[].tagName')

          TOTAL=${#TAGS[@]}
          echo "## GitHub Release housekeeping" >> "$GITHUB_STEP_SUMMARY"
          echo "- Total releases: **$TOTAL**, keeping newest **$KEEP**" >> "$GITHUB_STEP_SUMMARY"

          if [ "$TOTAL" -le "$KEEP" ]; then
            echo "- Nothing to prune." >> "$GITHUB_STEP_SUMMARY"
            echo "Nothing to prune ($TOTAL <= $KEEP)."
            exit 0
          fi

          PRUNE=("${TAGS[@]:$KEEP}")
          echo "- Pruning **${#PRUNE[@]}** older releases (tags kept):" >> "$GITHUB_STEP_SUMMARY"
          for tag in "${PRUNE[@]}"; do
            if [ "$DRY_RUN" = "true" ]; then
              echo "  - [dry-run] would delete release $tag" >> "$GITHUB_STEP_SUMMARY"
              echo "[dry-run] would delete release $tag"
            else
              # Delete the release only; --cleanup-tag is intentionally omitted so
              # the git tag survives and the build stays recreatable.
              gh release delete "$tag" --repo "$REPO" --yes
              echo "  - deleted release $tag" >> "$GITHUB_STEP_SUMMARY"
              echo "deleted release $tag"
            fi
          done
