name: CI — Unity Client Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Unity Build (StandaloneLinux64)
    runs-on: [self-hosted, windows]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Checkout orlo-proto
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/orlo-proto
          path: orlo-proto
          token: ${{ secrets.GH_PAT }}

      - name: Install protoc
        run: choco install protoc --yes

      - name: Generate C# proto sources
        shell: pwsh
        run: |
          $protoDir = "orlo-proto/proto"
          $outDir = "Assets/Scripts/Proto/Generated"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          $protos = Get-ChildItem "$protoDir/orlo" -Filter "*.proto" | ForEach-Object { $_.FullName }
          & protoc --proto_path=$protoDir --csharp_out=$outDir @protos
          Write-Host "Generated C# files:"
          Get-ChildItem $outDir

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-StandaloneLinux64-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-StandaloneLinux64-
            Library-

      # TODO: Remove continue-on-error after Unity license activation (com.unity.editor.headless)
      - name: Build with Unity
        continue-on-error: true
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "C:\WINDOWS\system32\config\systemprofile\AppData\Local\Unity\Caches" | Out-Null
          $unity = "C:\Program Files\Unity\Hub\Editor\6000.4.0f1\Editor\Unity.exe"
          & $unity -batchmode -nographics -quit -projectPath . `
            -buildTarget StandaloneLinux64 `
            -executeMethod BuildScript.Build `
            -logFile - `
            -buildPath "build/linux/OrloClient"
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: StandaloneLinux64
          path: build/linux
          retention-days: 7
