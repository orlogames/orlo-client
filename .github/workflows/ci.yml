name: CI — Unity Client Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Unity Build (StandaloneLinux64)
    runs-on: [self-hosted, windows]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Checkout orlo-proto
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/orlo-proto
          path: orlo-proto
          token: ${{ secrets.GH_PAT }}

      - name: Install protoc
        run: choco install protoc --yes

      - name: Generate C# proto sources
        shell: bash
        run: |
          PROTO_DIR="orlo-proto/proto"
          OUT_DIR="Assets/Scripts/Proto/Generated"
          mkdir -p "$OUT_DIR"
          protoc \
            --proto_path="$PROTO_DIR" \
            --csharp_out="$OUT_DIR" \
            "$PROTO_DIR"/orlo/common.proto \
            "$PROTO_DIR"/orlo/auth.proto \
            "$PROTO_DIR"/orlo/world.proto \
            "$PROTO_DIR"/orlo/packet.proto
          echo "Generated C# files:"
          ls -la "$OUT_DIR"

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-StandaloneLinux64-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-StandaloneLinux64-
            Library-

      - name: Build with Unity
        shell: pwsh
        run: |
          $unity = "C:\Program Files\Unity\Hub\Editor\6000.0.71f1\Editor\Unity.exe"
          & $unity -batchmode -nographics -quit -projectPath . `
            -buildTarget StandaloneLinux64 `
            -executeMethod BuildScript.Build `
            -logFile build-log.txt `
            -buildPath "build/linux/OrloClient"
          if ($LASTEXITCODE -ne 0) { Get-Content build-log.txt -Tail 50; exit 1 }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: StandaloneLinux64
          path: build/linux
          retention-days: 7
